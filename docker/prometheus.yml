global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'insightai-backend'
    metrics_path: '/health' # wait, GET /health or GET /metrics? We will register Prometheus at /metrics.
    static_configs:
      - targets: ['backend:8000']

  - job_name: 'insightai-metrics'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:8000']
